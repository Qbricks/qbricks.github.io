stages:
  - lint
  - build
  - test
  - doc
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

variables:
  OPAMYES: "1"
  OPAMVERBOSE: "1"
  PROJECT_ROOT: "$CI_PROJECT_DIR"

before_script:
  - sudo apt-get update
  - sudo apt-get install -y libgmp-dev pkg-config
  - opam update
  - opam install dune zarith landmarks benchmark lwt batteries logs menhir landmarks-ppx alcotest odoc

lint:
  image: ocaml/opam:ubuntu-20.04-ocaml-5.1
  stage: lint
  tags:
    - docker
  script:
    - opam lint

build:
  image: ocaml/opam:ubuntu-20.04-ocaml-5.1
  stage: build
  tags:
    - docker
  script:
    - dune build

test:
  image: ocaml/opam:ubuntu-20.04-ocaml-5.1
  stage: test
  tags:
    - docker
  script:
    - dune build @primitives
    - dune build @verif
    - dune build @unitary
    - dune build @qiskit
    - dune build @mbqc

doc:
  image: ocaml/opam:ubuntu-20.04-ocaml-5.1
  stage: doc
  tags:
    - docker
  script:
    - dune build @doc
    - mkdir -p public
    - cp -r _build/default/_doc/_html/* public/
  artifacts:
    paths:
      - public

pages:
  stage: deploy
  image: ocaml/opam:ubuntu-20.04-ocaml-5.1
  tags:
    - docker
  script:
    - echo "Publishing documentation via GitLab Pages"
  artifacts:
    paths:
      - public
  only:
    - comments
